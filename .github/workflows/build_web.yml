name: Build Flutter Web

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-web-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-web-

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web (WASM – avoids dart2js 64-bit int limits)
        run: flutter build web --wasm --base-href /watchtower/

      - name: Show build size
        run: |
          if [ -d "build/web" ]; then
            echo "Web build size: $(du -sh build/web | cut -f1)"
            ls -la build/web/
          fi

      - name: Upload web artifact (CI)
        uses: actions/upload-artifact@v4
        with:
          name: watchtower-web
          path: build/web/
          retention-days: 7

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web/

  deploy:
    name: Deploy to GitHub Pages
    needs: build-web
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
