name: Build Flutter Web

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-web-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-web-

      - name: Install dependencies
        run: flutter pub get

      - name: Patch pseudom CSSParser for dart2js
        run: |
          FILE=$(find ~/.pub-cache -name "CSSParser.dart" -path "*/pseudom*" 2>/dev/null | head -1)
          if [ -n "$FILE" ]; then
            sed -i 's/& -3765256679076942294/\& 0/g' "$FILE"
            sed -i 's/& 4626330031550017026/\& 0/g' "$FILE"
            sed -i 's/& 5779244251887978624/\& 0/g' "$FILE"
            sed -i 's/& -4597022382133018102/\& 0/g' "$FILE"
            sed -i 's/& -4020561629828808022/\& 0/g' "$FILE"
            sed -i 's/& -2612335174470078806/\& 0/g' "$FILE"
            echo "Patched $FILE"
          else
            echo "pseudom CSSParser.dart not found, skipping patch"
          fi

      - name: Build Web
        run: flutter build web --no-tree-shake-icons --release --base-href /watchtower/

      - name: Show build size
        run: |
          if [ -d "build/web" ]; then
            echo "Web build size: $(du -sh build/web | cut -f1)"
            ls -la build/web/
          fi

      - name: Upload web artifact (CI)
        uses: actions/upload-artifact@v4
        with:
          name: watchtower-web
          path: build/web/
          retention-days: 7

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web/

  deploy:
    name: Deploy to GitHub Pages
    needs: build-web
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
