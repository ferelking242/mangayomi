name: Build & Deploy Web

on:
  push:
    branches: [main, master, service-dart-fix]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Configure web platform
        run: |
          flutter --version
          flutter create . --platforms=web --project-name watchtower || true
      - name: Pub get
        run: flutter pub get
      - name: Build web
        run: |
          set -o pipefail
          flutter build web --release --no-tree-shake-icons --pwa-strategy=none --base-href "/watchtower/" 2>&1 | tee build.log || true
          if [ ! -f build/web/index.html ]; then
            echo "::error::Web build failed"
            tail -300 build.log
            exit 1
          fi
          cp build/web/index.html build/web/404.html
          ls -lah build/web
      - name: Upload artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: watchtower-web
          path: build/web
          if-no-files-found: error
          retention-days: 14
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy-pages:
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
